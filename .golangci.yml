version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gocritic
    - gosec
    - misspell
    - revive
    - unconvert
    - unparam
    - bodyclose
    - nilerr
    - prealloc

  exclusions:
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - gosec
          - unparam
          - prealloc
      - path: examples/
        linters:
          - errcheck
          - gosec
      - path: cmd/
        linters:
          - gosec

  settings:
    gosec:
      excludes:
        - G404
        - G115
    revive:
      rules:
        - name: var-naming
          disabled: false
        - name: exported
          disabled: true
    gocritic:
      disabled-checks:
        - ifElseChain
        - singleCaseSwitch

formatters:
  enable:
    - gofmt
    - goimports

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
