name: stale

on:
  schedule:
    - cron: "23 1 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          days-before-issue-stale: 60
          days-before-issue-close: 14
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: "pinned,security,bug,roadmap,help wanted"
          exempt-pr-labels: "pinned,security,work-in-progress"
          stale-issue-message: |
            This issue has been inactive for 60 days and is being marked as stale.
            It will be closed in 14 days unless updated. Reply with new context or
            remove the `stale` label to keep it open.
          close-issue-message: |
            Closed automatically as stale. Feel free to reopen with new information.
          stale-pr-message: |
            This pull request has been inactive for 30 days and is being marked as stale.
            It will be closed in 14 days unless updated.
          close-pr-message: |
            Closed automatically as stale. Open a new PR when you have time to continue.
          operations-per-run: 100
